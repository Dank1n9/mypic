<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我喜欢你</title>
    <!-- 引入 Vue 3 和 Masonry 库 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 使用指定的背景图：完美覆盖 + 模糊滤镜 */
            background-image: url('https://file.shiorko.dpdns.org/file/bj.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            padding: 30px 20px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        
        /* 添加一层半透明磨砂玻璃效果的遮罩，让文字更清晰，同时透出背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 0;
            pointer-events: none;
        }

        /* 所有内容层级在磨砂层之上 */
        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部区域：酷炫标题 + 简洁描述 */
        .header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeInDown 0.8s ease-out;
        }
        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFF 0%, #FFE6B0 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
        }

        /* 瀑布流网格容器 */
        .grid {
            margin: 0 auto;
        }
        /* 每个图片卡片 */
        .grid-item {
            width: 280px;
            margin-bottom: 25px;
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .grid-item:hover {
            transform: translateY(-8px);
            background: rgba(40, 40, 55, 0.8);
            box-shadow: 0 25px 40px -15px black;
            border-color: rgba(255,215,120,0.6);
        }
        /* 图片本身 */
        .grid-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }
        .grid-item:hover img {
            transform: scale(1.02);
        }
        /* 图片描述文字 */
        .img-caption {
            padding: 12px 16px 16px;
            color: #f0f0f0;
            font-size: 0.85rem;
            font-weight: 500;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
        }
        .img-caption span {
            display: block;
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        /* 模态框 (全屏预览图) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            animation: zoomIn 0.2s ease-out;
            cursor: default;
        }
        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .close-modal:hover {
            color: #ffd966;
            transform: scale(1.1);
            background: rgba(0,0,0,0.8);
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 50px;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            width: fit-content;
            margin: 50px auto;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        /* 响应式微调 */
        @media (max-width: 650px) {
            body { padding: 15px 10px; }
            .header h1 { font-size: 2rem; }
            .grid-item { width: calc(50% - 12px); margin-bottom: 15px; }
        }
        @media (max-width: 480px) {
            .grid-item { width: 100%; }
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,215,0,0.6);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <div class="header">
            <h1>好图都在这了</h1>
            <p>点击图片放大</p>
        </div>

        <!-- 瀑布流容器 -->
        <div ref="gridContainer" class="grid">
            <div v-for="(img, idx) in imageList" :key="idx" class="grid-item" @click="openModal(img.url)">
                <img :src="img.url" :alt="img.title" loading="lazy">
                <div class="img-caption">
                    {{ img.title }}
                    <span>{{ img.date || '✨ 珍藏瞬间' }}</span>
                </div>
            </div>
        </div>
        
        <div v-if="imageList.length === 0 && !loading" class="loading">
            🌟 暂无图片，稍后再来~
        </div>
    </div>

    <!-- 全屏预览模态框 -->
    <div id="imageModal" class="modal" @click.self="closeModal">
        <span class="close-modal" @click="closeModal">&times;</span>
        <img class="modal-content" :src="currentImg" alt="Preview" id="previewImg">
    </div>
</div>

<script>
    const { createApp, ref, onMounted, nextTick } = Vue;

    createApp({
        setup() {
            const imageList = ref([]);
            const loading = ref(true);
            const gridContainer = ref(null);
            const currentImg = ref('');
            let msnry = null;

            // 这里是图片数据源，你可以随意增删改图片 + 描述！
            // 👇 替换这里的图片链接 (url) 和 标题 (title) 来展示你自己的作品集
            //  { url: '', title: '', date: '' },
            const mockImages = [
                { url: './pic/1.jpg', title: 'AI刚跑出来的', date: 'OMG!' },
                
            ];

            // 打开预览
            const openModal = (url) => {
                currentImg.value = url;
                const modal = document.getElementById('imageModal');
                modal.classList.add('show');
                document.body.style.overflow = 'hidden';
            };
            // 关闭预览
            const closeModal = () => {
                const modal = document.getElementById('imageModal');
                modal.classList.remove('show');
                document.body.style.overflow = '';
                currentImg.value = '';
            };

            // 初始化瀑布流
            const initMasonry = () => {
                if (msnry) msnry.destroy();
                if (gridContainer.value) {
                    nextTick(() => {
                        msnry = new Masonry(gridContainer.value, {
                            itemSelector: '.grid-item',
                            columnWidth: '.grid-item',
                            gutter: 25,
                            fitWidth: true,
                            transitionDuration: '0.2s'
                        });
                    });
                }
            };

            onMounted(async () => {
                // 模拟加载数据 (这里你可以替换成真实的API或者直接使用mockImages)
                // 如果是真实项目，可以用 fetch 获取自己的图片列表，格式保持 { url, title, date }
                setTimeout(() => {
                    imageList.value = mockImages;
                    loading.value = false;
                    initMasonry();
                    // 监听图片加载完成，重新布局
                    const images = document.querySelectorAll('.grid-item img');
                    let loadedCount = 0;
                    images.forEach(img => {
                        if (img.complete) loadedCount++;
                        else img.addEventListener('load', () => {
                            loadedCount++;
                            if (loadedCount === images.length && msnry) msnry.layout();
                        });
                    });
                    if (loadedCount === images.length && msnry) msnry.layout();
                }, 300);
            });

            return {
                imageList,
                loading,
                gridContainer,
                currentImg,
                openModal,
                closeModal
            };
        }
    }).mount('#app');
</script>
</body>
</html>
