<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我喜欢你</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://file.shiorko.dpdns.org/file/bj.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            padding: 30px 20px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeInDown 0.8s ease-out;
        }
        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFF 0%, #FFE6B0 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
        }

        .grid {
            margin: 0 auto;
        }

       
        .grid-item {
            width: 280px;
            margin-bottom: 25px;
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            will-change: transform;
        }

        
        .grid-item:not(.focused) {
            transform: scale(0.96);
            opacity: 0.85;
        }

        
        .grid-item.focused {
            transform: scale(1.04);
            background: rgba(55, 55, 75, 0.95);
            box-shadow: 0 30px 45px -10px black;
            border-color: rgba(255,215,120, 0.9);
            z-index: 10;
            position: relative;
        }

        
        .grid-item:hover {
            transform: scale(1.07) !important;
            background: rgba(80, 80, 110, 0.98) !important;
            border-color: #ffd966 !important;
            box-shadow: 0 40px 60px -15px black !important;
            z-index: 20;
            transition: all 0.25s ease-out;
        }

        
        .grid-item .img-square {
            width: 100%;
            aspect-ratio: 1 / 1;   
            overflow: hidden;
            background: #1a1a2a;
        }
        .grid-item img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;      
            transition: transform 0.4s ease;
        }
        .grid-item:hover img {
            transform: scale(1.05);
        }

        
        .img-caption {
            padding: 12px 16px 16px;
            color: #f0f0f0;
            font-size: 0.85rem;
            font-weight: 500;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
        }
        .img-caption span {
            display: block;
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;  
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            animation: zoomIn 0.2s ease-out;
            cursor: default;
        }
        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .close-modal:hover {
            color: #ffd966;
            transform: scale(1.1);
            background: rgba(0,0,0,0.8);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 50px;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            width: fit-content;
            margin: 50px auto;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        @media (max-width: 650px) {
            body { padding: 15px 10px; }
            .header h1 { font-size: 2rem; }
            .grid-item { width: calc(50% - 12px); margin-bottom: 15px; }
        }
        @media (max-width: 480px) {
            .grid-item { width: 100%; }
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,215,0,0.6);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <div class="header">
            <h1> 好图都在这了 </h1>
            <p>点击图片放大</p>
        </div>

        <div ref="gridContainer" class="grid">
            <div v-for="(img, idx) in imageList" :key="idx" 
                 class="grid-item" 
                 :class="{ focused: focusedIndices.has(idx) }"
                 @click="openModal(img.url)">
                <div class="img-square">
                    <img :src="img.url" :alt="img.title" loading="lazy">
                </div>
                <div class="img-caption">
                    {{ img.title }}
                    <span>{{ img.date || '无描述' }}</span>
                </div>
            </div>
        </div>

        <div style="text-align: center; font-size: 16px; font-weight: bold;
            background: linear-gradient(135deg, #ff66cc, #ffcc33, #66ff66, #33ccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;">
            <br>
            <br>
            <br>
            © 2026 Shiorko. SOME rights reserved.
        </div>
        
        <div style="text-align: center;">
        <a href="https://copyright.shiorko.dpdns.org" style="color: #ff66cc; font-size: 10px; text-decoration: none;">
        <br>
        
        点击查看详细信息
        </a>
        </div>
        
        <div v-if="imageList.length === 0 && !loading" class="loading">
            🌟 暂无图片，稍后再来~
        </div>
    </div>

    
    <div id="imageModal" class="modal" @click.self="closeModal">
        <span class="close-modal" @click="closeModal">&times;</span>
        <img class="modal-content" :src="currentImg" alt="Preview">
    </div>
</div>

<script>
    const { createApp, ref, onMounted, onBeforeUnmount, nextTick } = Vue;

    createApp({
        setup() {
            const imageList = ref([]);
            const loading = ref(true);
            const gridContainer = ref(null);
            const currentImg = ref('');
            const focusedIndices = ref(new Set());
            let msnry = null;
            let ticking = false;
            let scrollListener = null;

            
            //  { url: './pic/', title: '', date: '' },
//----------------------------------------------------------------------------------------------------------------------//            
            const mockImages = [
                { url: './pic/1.jpg', title: 'AI刚跑出来的', date: '26/4/25' },
                { url: './pic/ctl.png', title: 'AI刚跑出来的', date: '26/4/25' },
                { url: './pic/3.png', title: '效果最好的一个', date: '26/4/25' },
                { url: './pic/4.png', title: '无火星文版', date: '26/4/25' },
                { url: './pic/5.png', title: '🤔', date: '' },
                
//----------------------------------------------------------------------------------------------------------------------//
            ];

            
            const updateFocus = () => {
                if (!gridContainer.value) return;
                const items = gridContainer.value.querySelectorAll('.grid-item');
                if (items.length === 0) return;
                const viewportCenter = window.innerHeight / 2;
                let totalHeight = 0;
                items.forEach(item => totalHeight += item.offsetHeight);
                const avgHeight = totalHeight / items.length;
                const threshold = avgHeight * 0.7;
                const newFocusedIndices = new Set();
                items.forEach((item, idx) => {
                    const rect = item.getBoundingClientRect();
                    const itemCenter = rect.top + rect.height / 2;
                    if (Math.abs(itemCenter - viewportCenter) < threshold) {
                        newFocusedIndices.add(idx);
                    }
                });
                focusedIndices.value = newFocusedIndices;
            };

            const onScroll = () => {
                if (!ticking) {
                    requestAnimationFrame(() => {
                        updateFocus();
                        ticking = false;
                    });
                    ticking = true;
                }
            };

            const initMasonry = () => {
                if (msnry) msnry.destroy();
                if (gridContainer.value) {
                    nextTick(() => {
                        msnry = new Masonry(gridContainer.value, {
                            itemSelector: '.grid-item',
                            columnWidth: '.grid-item',
                            gutter: 25,
                            fitWidth: true,
                            transitionDuration: '0.2s'
                        });
                        updateFocus();
                    });
                }
            };

            const layoutMasonry = () => {
                if (msnry) {
                    msnry.layout();
                    updateFocus();
                }
            };

            const openModal = (url) => {
                currentImg.value = url;
                const modal = document.getElementById('imageModal');
                modal.classList.add('show');
                document.body.style.overflow = 'hidden';
            };

            const closeModal = () => {
                const modal = document.getElementById('imageModal');
                modal.classList.remove('show');
                document.body.style.overflow = '';
                currentImg.value = '';
            };

            onMounted(() => {
                setTimeout(() => {
                    imageList.value = mockImages;
                    loading.value = false;
                    initMasonry();

                   
                    const images = document.querySelectorAll('.grid-item img');
                    let loadedCount = 0;
                    const onImageLoad = () => {
                        loadedCount++;
                        if (loadedCount === images.length) {
                            layoutMasonry();
                        }
                    };
                    images.forEach(img => {
                        if (img.complete) onImageLoad();
                        else img.addEventListener('load', onImageLoad);
                    });

                    scrollListener = onScroll;
                    window.addEventListener('scroll', scrollListener);
                    window.addEventListener('resize', () => {
                        if (msnry) msnry.layout();
                        updateFocus();
                    });
                    updateFocus();
                }, 300);
            });

            onBeforeUnmount(() => {
                if (scrollListener) window.removeEventListener('scroll', scrollListener);
                if (msnry) msnry.destroy();
            });

            return {
                imageList,
                loading,
                gridContainer,
                currentImg,
                focusedIndices,
                openModal,
                closeModal
            };
        }
    }).mount('#app');
</script>
</body>
</html>
